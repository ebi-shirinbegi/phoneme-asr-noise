stages:
  download:
    foreach: ${languages}
    do:
      cmd: pixi run python src/download_data.py ${key}
      params:
        - languages.${key}
        - n_utterances
        - seed
      outs:
        - data/raw/${key}/wav
        - data/manifests/${key}/clean.jsonl

  phonemize:
    foreach: ${languages}
    do:
      cmd: pixi run python src/phonemize.py ${key} data/manifests/${key}/clean.jsonl data/manifests/${key}/phonemized.jsonl
      deps:
        - src/phonemize.py
        - data/manifests/${key}/clean.jsonl
      params:
        - languages.${key}
      outs:
        - data/manifests/${key}/phonemized.jsonl

  run_all:
    foreach: ${languages}
    do:
      cmd: pixi run python src/run_all_snr.py ${key}
      deps:
        - src/add_noise.py
        - src/predict.py
        - src/evaluate.py
        - src/run_all_snr.py
        - data/manifests/${key}/phonemized.jsonl
      params:
        - snr_levels
        - seed
        - model_name
      outs:
        - data/metrics/${key}

  plot:
    cmd: pixi run python src/plot.py data/metrics data/figures/per_vs_snr.png
    deps:
      - src/plot.py
      - data/metrics
    plots:
      - data/figures/per_vs_snr.png