[workspace]
channels = ["conda-forge", "pytorch"]
name = "Lab3stuff"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.*"
pip = ">=26.0.1,<27"
numpy = ">=2.4.2,<3"
dvc = ">=3.66.1,<4"
pytorch = ">=2.10.0,<3"
torchaudio = ">=2.10.0,<3"
transformers = ">=5.3.0,<6"
datasets = ">=4.6.1,<5"

[pypi-dependencies]
jiwer = ">=4.0.0, <5"
soundfile = ">=0.13.1, <0.14"
espeak-phonemizer = ">=1.3.1, <2"
matplotlib = ">=3.10.8, <4"
phonemizer = ">=3.3.0, <4"
protobuf = ">=7.34.0, <8"
pyyaml = "*"
